dist: jammy
language: python

cache:
  directories:
    - .venv
    - $HOME/.local/share/uv

python:
  - "3.13"

branches:
  only:
  - dev

before_install:
  - sudo apt-get install -y optipng
  - curl -LsSf https://astral.sh/uv/install.sh | sh
  - export PATH="$HOME/.cargo/bin:$PATH"

addons:
  apt:
    update: true

install:
  - uv sync

script:
  - uv run pelican -s pelicanconf.py

deploy:
  provider: pages
  skip_cleanup: true
  github_token: $GITHUB_TOKEN
  keep_history: true
  local_dir: ./output
  target_branch: master
  on:
    branch: dev

notifications:
  email:
    on_success: change
    on_failure: always
